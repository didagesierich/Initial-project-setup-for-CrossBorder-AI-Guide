<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CrossBorder AI Guide</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#dbeeff;
    margin:0;
}

header{
    background:white;
    padding:20px;
    text-align:center;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

header img{
    height:60px;
}

.container{
    max-width:900px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
}

textarea{
    width:100%;
    height:120px;
    padding:10px;
    font-size:16px;
}

button{
    margin-top:15px;
    padding:12px 20px;
    font-size:16px;
    background:#0066cc;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#004999;
}

.result{
    margin-top:30px;
    background:#f4f7fb;
    padding:20px;
    border-radius:8px;
}

.flow{
    margin-top:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
<img src="logo.png" alt="CrossBorder AI Guide Logo">
<h2>CrossBorder AI Guide</h2>
</header>

<div class="container">

<h3>Describe your situation</h3>

<textarea id="userInput"
placeholder="Example: I got married in Germany and need to register the marriage in Romania."></textarea>

<button onclick="analyze()">Analyze Procedure</button>

<div id="result" class="result"></div>

<div id="flow" class="flow"></div>

</div>

<script>

function analyze(){

let text = document.getElementById("userInput").value;

if(!text){
document.getElementById("result").innerHTML = "Please describe your situation.";
return;
}

document.getElementById("result").innerHTML = `
<b>Cross-Border Procedure Roadmap</b><br><br>

<b>Scenario:</b> ${text}<br><br>

<b>Required documents:</b><br>
• Identity document<br>
• Civil status certificates<br>
• Proof of residence<br>
• Certified translations if required<br><br>

<b>Institutions:</b><br>
• Local administrative authority<br>
• Civil registry office<br>
• Foreign authority in origin country<br><br>

<b>Next steps:</b><br>
1. Verify document requirements<br>
2. Obtain certified translations if needed<br>
3. Submit documents to relevant authority<br>
4. Wait for confirmation of registration
`;

document.getElementById("flow").innerHTML =
"User scenario → AI interpretation → Procedure mapping → Roadmap generation";

}

</script>

</body>
</html>
